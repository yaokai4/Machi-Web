# Machi — containerized stack (Caddy + Next.js web + scalable Python backend).
#
#   cd web
#   cp .env.example .env            # fill real secrets (NEVER committed)
#   MACHI_DOMAIN=www.machicity.com docker compose -f deploy/docker-compose.yml up -d --build
#   docker compose -f deploy/docker-compose.yml up -d --scale backend=4   # scale the HTTP pool
#
# Persistence: the SQLite DB and uploaded media live on named volumes shared
# by the backend pool and the scheduler — SQLite WAL gives concurrent readers
# + a serialized writer across all of them (same volume = same filesystem,
# so file locking works). Secrets come from ../.env at runtime, never baked
# into an image.
#
# Startup order is health-gated so the DB is initialized exactly once before
# the pool fans out: scheduler (runs init + migrations) -> backend pool ->
# web -> caddy. This avoids a first-run migration race between containers.

name: machi

x-backend-build: &backend-build
  build:
    context: ..
    dockerfile: deploy/docker/Dockerfile.backend

x-backend-common: &backend-common
  env_file: ../.env
  volumes:
    - kaix-db:/data
    - kaix-media:/app/media
  # parity with the systemd MemoryMax=2048M profile
  mem_limit: 2g
  restart: unless-stopped

services:
  # Singleton: runs init_db()/migrations on first boot + the crawler
  # scheduler + background writers. Starts FIRST so it owns schema setup.
  scheduler:
    <<: [*backend-build, *backend-common]
    environment:
      KAIX_ENABLE_SCHEDULERS: "1"
      KAIX_DB_PATH: /data/kaix.db

  # Scalable HTTP backend pool. No crawler scheduler here so scaling never
  # duplicates crawl work. Waits until the scheduler has the DB ready.
  backend:
    <<: [*backend-build, *backend-common]
    environment:
      KAIX_ENABLE_SCHEDULERS: "0"
      KAIX_DB_PATH: /data/kaix.db
    expose:
      - "8787"
    depends_on:
      scheduler:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.web
    # No API base needed: Caddy proxies /api, /media and /healthz straight to
    # the backend pool before they reach Next, and browser calls are
    # same-origin (lib/api.ts uses a relative base). The CSP default already
    # allows 'self'.
    expose:
      - "3000"
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 4s
      start_period: 30s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      MACHI_DOMAIN: "${MACHI_DOMAIN:-localhost}"
      ACME_EMAIL: "${ACME_EMAIL:-admin@machicity.com}"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kaix-db:
  kaix-media:
  caddy-data:
  caddy-config:
