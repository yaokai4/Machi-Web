# /etc/nginx/sites-available/kaix.conf
#
# KaiX edge configuration. Terminates TLS, serves the Next.js Web client,
# proxies /api to the Python backend, and lets SSE (/api/events) stream
# without buffering.
#
# Usage:
#   sudo apt install nginx
#   sudo ln -s /opt/kaix/web/deploy/nginx.conf /etc/nginx/sites-available/kaix.conf
#   sudo ln -s /etc/nginx/sites-available/kaix.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d kaix.app -d www.kaix.app
#   sudo nginx -t && sudo systemctl reload nginx

# Cap noisy/abusive clients before they touch our app process.
limit_req_zone $binary_remote_addr zone=kaix_api:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=kaix_auth:10m rate=2r/s;

upstream kaix_backend {
    server 127.0.0.1:8787;
    keepalive 32;
}
upstream kaix_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kaix.app www.kaix.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kaix.app www.kaix.app;

    # certbot writes these on first run
    ssl_certificate     /etc/letsencrypt/live/kaix.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaix.app/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # body limit for media uploads (matches KAIX_MAX_UPLOAD_BYTES)
    client_max_body_size 60m;
    # generous header buffer for long Bearer tokens
    large_client_header_buffers 4 16k;

    # forwarded headers — server.py honors X-Forwarded-For for rate limiting
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ---- Server-Sent Events: no buffering, no read timeout ----
    location = /api/events {
        proxy_pass http://kaix_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        gzip off;
    }

    # ---- Stricter limit for auth endpoints ----
    location ~ ^/api/auth/ {
        limit_req zone=kaix_auth burst=10 nodelay;
        proxy_pass http://kaix_backend;
    }

    # ---- API + media served by the Python backend ----
    location /api/ {
        limit_req zone=kaix_api burst=40 nodelay;
        proxy_pass http://kaix_backend;
    }
    location /media/ {
        proxy_pass http://kaix_backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /healthz {
        proxy_pass http://kaix_backend;
        access_log off;
    }
    location = /readyz {
        proxy_pass http://kaix_backend;
        access_log off;
    }

    # ---- Everything else: Next.js ----
    location /_next/static/ {
        proxy_pass http://kaix_web;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Service worker must never be cached at the edge, or users get
    # trapped on the old buggy worker after a deploy.
    location = /sw.js {
        proxy_pass http://kaix_web;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }
    location = /reset.html {
        proxy_pass http://kaix_web;
        add_header Cache-Control "no-store" always;
    }
    location / {
        proxy_pass http://kaix_web;
    }

    # gzip text responses
    gzip on;
    gzip_proxied any;
    gzip_types application/javascript application/json text/css text/plain text/xml image/svg+xml;
    gzip_min_length 1024;

    # baseline security
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
