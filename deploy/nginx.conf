# /etc/nginx/sites-available/kaix.conf
#
# KaiX edge configuration. Terminates TLS, serves the Next.js Web client,
# proxies /api to the Python backend, and lets SSE (/api/events) stream
# without buffering.
#
# Usage:
#   sudo apt install nginx
#   sudo ln -s /opt/kaix/web/deploy/nginx.conf /etc/nginx/sites-available/kaix.conf
#   sudo ln -s /etc/nginx/sites-available/kaix.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d machicity.com -d www.machicity.com
#   sudo nginx -t && sudo systemctl reload nginx

# Cap noisy/abusive clients before they touch our app process. The generic
# API allowance is deliberately large enough for one page's parallel reads
# (and for users sharing a carrier/NAT address); sensitive operations still
# have stricter application-level limits.
limit_req_zone $binary_remote_addr zone=kaix_api:10m  rate=30r/s;
# Realtime (SSE stream + token) gets its OWN zone so a client reconnect storm
# can never drain the general per-IP /api budget and 429 the user's other calls.
limit_req_zone $binary_remote_addr zone=kaix_rt:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=kaix_auth:10m rate=2r/s;
limit_req_status 429;
# Per-IP cap on CONCURRENT SSE streams so one runaway/abusive client can't drain
# the backend's KAIX_SSE_MAX_CONNECTIONS pool (which 503s realtime for everyone).
limit_conn_zone $binary_remote_addr zone=kaix_sse_conn:10m;
limit_conn_status 429;

# Backend is a single-threaded-per-request Python process; one process can't
# saturate multiple CPU cores (GIL). To handle high concurrency, run several
# backend instances on consecutive ports (see deploy/kaix-backend-worker@.service)
# and let nginx load-balance across them. They share PostgreSQL, so write
# concurrency is coordinated by the database rather than a process lock.
#   - 8787  = primary (runs the crawler scheduler, KAIX_ENABLE_SCHEDULERS=1)
#   - 8788+ = workers  (KAIX_ENABLE_SCHEDULERS=0)
#
# DEFAULT IS SINGLE-INSTANCE (only 8787) so this file is safe to deploy on a
# box that hasn't started any workers. To SCALE: first start the worker units
# (systemctl enable --now kaix-backend-worker@8788 ...), THEN uncomment the
# matching `server` lines below and `nginx -t && systemctl reload nginx`.
# Leaving dead ports uncommented would make nginx log upstream errors and
# waste connect attempts, so keep them commented until the workers are up.
#
# REALTIME (SSE, /api/events) IS CROSS-WORKER SAFE — but ONLY once redis is
# configured. The app publishes every realtime event both to the local
# in-process EventHub AND to a redis pub/sub EventBus (server_shared_state.py);
# each worker starts a subscriber that re-injects events published by its peers,
# so a message written on 8788 reaches an SSE client parked on 8787. SSE-connect
# auth also degrades gracefully across workers: the one-shot ?token= is
# process-local, but api_events falls back to the standard Bearer/session-cookie
# auth (require_user) when a token lands on the worker that didn't mint it, so no
# stream is dropped.
#
# THEREFORE the multi-instance prerequisite is REDIS, not "keep it to one box":
#   1. Provision redis and export KAIX_REDIS_URL=redis://127.0.0.1:6379/0 in
#      /etc/kaix.env for EVERY backend unit (primary + workers), then restart
#      them. Without KAIX_REDIS_URL the EventBus is a no-op and SSE fan-out stays
#      in-process — in that (and only that) case keep this single-instance.
#   2. Start the worker units, THEN uncomment the matching server lines below.
#   3. Verify fan-out before trusting it: open an SSE stream, trigger an event
#      that must round-trip through a different worker (e.g. a DM / room message
#      posted via a second connection), and confirm it arrives.
upstream kaix_backend {
    least_conn;
    server 127.0.0.1:8787 max_fails=3 fail_timeout=10s;
    # server 127.0.0.1:8788 max_fails=3 fail_timeout=10s;  # enable ONLY after KAIX_REDIS_URL is set on all units AND the worker is up
    # server 127.0.0.1:8789 max_fails=3 fail_timeout=10s;  # enable only on ≥4-core boxes
    # server 127.0.0.1:8790 max_fails=3 fail_timeout=10s;
    keepalive 64;
}
upstream kaix_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name machicity.com www.machicity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name machicity.com www.machicity.com;

    # certbot writes these on first run
    ssl_certificate     /etc/letsencrypt/live/machicity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/machicity.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # body limit for private media/local fallback uploads (matches
    # KAIX_MAX_UPLOAD_BYTES; public uploads go direct to S3).
    client_max_body_size 320m;
    # generous header buffer for long Bearer tokens
    large_client_header_buffers 4 16k;

    # forwarded headers — server.py honors X-Forwarded-For for rate limiting
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    # This host is the only trusted reverse proxy. Overwrite, rather than
    # append, so a client cannot spoof the first X-Forwarded-For address and
    # bypass the backend's per-IP controls.
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ---- Server-Sent Events: no buffering, no read timeout ----
    # Prefix match (^~) so BOTH the stream (/api/events) and the token endpoint
    # (/api/events/token) are handled here and use the dedicated kaix_rt zone —
    # otherwise /api/events/token falls through to `location /api/` and shares
    # (and exhausts) the general budget during a reconnect storm.
    location ^~ /api/events {
        access_log off;                  # high-volume long-poll; don't fill the disk
        limit_conn kaix_sse_conn 4;      # max concurrent SSE per IP
        limit_req zone=kaix_rt burst=30 nodelay;
        proxy_pass http://kaix_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        gzip off;
    }

    # ---- Stricter limit for auth endpoints ----
    location ~ ^/api/auth/ {
        limit_req zone=kaix_auth burst=10 nodelay;
        proxy_pass http://kaix_backend;
    }

    # ---- API + media served by the Python backend ----
    location /api/ {
        limit_req zone=kaix_api burst=100 nodelay;
        proxy_pass http://kaix_backend;
    }
    location /media/ {
        proxy_pass http://kaix_backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /healthz {
        proxy_pass http://kaix_backend;
        access_log off;
    }
    location = /api/health {
        proxy_pass http://kaix_backend;
        access_log off;
    }
    location = /readyz {
        proxy_pass http://kaix_backend;
        access_log off;
    }

    # ---- Everything else: Next.js ----
    location /_next/static/ {
        proxy_pass http://kaix_web;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Service worker must never be cached at the edge, or users get
    # trapped on the old buggy worker after a deploy.
    location = /sw.js {
        proxy_pass http://kaix_web;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }
    location = /reset.html {
        proxy_pass http://kaix_web;
        add_header Cache-Control "no-store" always;
    }
    location / {
        proxy_pass http://kaix_web;
    }

    # gzip text responses
    gzip on;
    gzip_proxied any;
    gzip_types application/javascript application/json text/css text/plain text/xml image/svg+xml;
    gzip_min_length 1024;

    # baseline security
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
